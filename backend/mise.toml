[tools]
go = "1.26.1"

[tasks.fmt]
description = "Run gofmt"
run = "go fmt -w ."

[tasks.fmt-check]
description = "Check formatting"
run = "go fmt -l ."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.build]
description = "Build packages"
run = "go build ./..."

[tasks.schema]
description = "Generate OpenAPI schema to shared/openapi.json"
run = "go run ./cmd/gen-openapi"

[tasks.qa]
description = "Run formatting, lint, tests, and build"
depends = ["fmt:check", "lint", "test", "build"]
