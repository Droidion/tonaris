# rustfmt.toml

# Keep line width reasonable but not tiny
max_width = 100

# Use the new edition’s style (assuming 2021 or 2024 when available)
edition = "2021"

# Where possible, prefer using field init shorthand: Foo { x } instead of Foo { x: x }
use_field_init_shorthand = true

# Reorder imports
reorder_imports = true

# Keep match arms and control-flow blocks in a compact style where possible
match_arm_leading_pipes = "Preserve"
match_block_trailing_comma = true

# Misc quality-of-life
newline_style = "Unix"
use_small_heuristics = "Max"
