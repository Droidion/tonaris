# clippy.toml

# Don’t nag for having many args in functions; we’ll let design drive that.
too-many-arguments-threshold = 8

# Don’t complain that a type or function has many lines;
# big modules can be reasonable in some domains.
type-complexity-threshold = 250

# Allow slightly longer functions before complaining they're "too long".
# This is mostly about readability, so don't make it too strict.
cognitive-complexity-threshold = 30

# False positive hotspot: this lint can be noisy; we usually manage via allow attributes.
# You can leave it empty, but having the section here makes it explicit that
# we'll configure specifics via attributes in code when needed.
# (i.e., no global "deny" of super-opinionated lints)
